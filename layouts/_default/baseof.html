<!doctype html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Params.shopName }}{{ else }}{{ .Title }} · {{ .Site.Params.shopName }}{{ end }}</title>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'DM Sans', sans-serif;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-fade-up { animation: fadeUp 0.6s ease-out forwards; opacity: 0; }
    .anim-delay-1 { animation-delay: 0.1s; }
    .anim-delay-2 { animation-delay: 0.2s; }
    .anim-delay-3 { animation-delay: 0.3s; }
    .anim-delay-4 { animation-delay: 0.4s; }
    .anim-delay-5 { animation-delay: 0.5s; }
    .anim-delay-6 { animation-delay: 0.6s; }

    #app-wrapper {
      width: 100%;
      height: 100%;
      overflow: auto;
    }

    .hero-section {
      width: 100%;
      position: relative;
    }

    .hero-pattern {
      background-image:
        radial-gradient(circle at 20% 50%, rgba(220,38,38,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(220,38,38,0.05) 0%, transparent 40%),
        linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
    }
    .hero-pattern.light-mode {
      background-image:
        radial-gradient(circle at 20% 50%, rgba(220,38,38,0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(220,38,38,0.02) 0%, transparent 40%),
        linear-gradient(135deg, #ffffff 0%, #f9fafb 50%, #f3f4f6 100%);
    }

    .grid-bg {
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .grid-bg.light-mode {
      background-image:
        linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .section-container {
      max-width: 72rem;
      margin-left: auto;
      margin-right: auto;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }

    .hero-inner {
      padding-top: 4rem;
      padding-bottom: 4rem;
      position: relative;
      z-index: 10;
    }
    @media (min-width: 768px) {
      .hero-inner { padding-top: 6rem; padding-bottom: 6rem; }
    }

    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4rem;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .nav-logo {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: {{ .Site.Params.colors.primaryAction }};
      flex-shrink: 0;
    }

    .nav-shop-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: {{ .Site.Params.colors.text }};
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-links {
      display: none;
      align-items: center;
      gap: 2rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: {{ .Site.Params.colors.secondaryText }};
    }
    @media (min-width: 768px) {
      .nav-links { display: flex; }
    }
    .nav-links a {
      color: inherit;
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .nav-links a:hover { color: {{ .Site.Params.colors.text }}; }

    .lang-switcher {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .lang-btn {
      padding: 0.25rem 0.625rem;
      border-radius: 0.375rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-decoration: none;
      color: {{ .Site.Params.colors.secondaryText }};
      border: 1px solid transparent;
      transition: all 0.15s ease;
      letter-spacing: 0.05em;
    }
    .lang-btn:hover {
      color: {{ .Site.Params.colors.text }};
      border-color: rgba(0,0,0,0.15);
      background: rgba(0,0,0,0.04);
    }
    .lang-btn.lang-active {
      color: {{ .Site.Params.colors.primaryAction }};
      border-color: {{ .Site.Params.colors.primaryAction }};
      background: rgba(220,38,38,0.06);
    }

    .quality-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 1rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      background: rgba(220,38,38,0.15);
      color: {{ .Site.Params.colors.primaryAction }};
      border: 1px solid rgba(220,38,38,0.25);
      font-family: 'Outfit', sans-serif;
    }

    .hero-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 2.25rem;
      line-height: 1.15;
      margin: 0 0 1rem 0;
      color: {{ .Site.Params.colors.text }};
    }
    @media (min-width: 768px) {
      .hero-title { font-size: 3.75rem; }
    }

    .hero-tagline {
      font-size: 1.125rem;
      margin: 0 0 2rem 0;
      color: {{ .Site.Params.colors.secondaryText }};
    }
    @media (min-width: 768px) {
      .hero-tagline { font-size: 1.25rem; }
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      border-radius: 9999px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      color: #ffffff;
      text-decoration: none;
      background: {{ .Site.Params.colors.primaryAction }};
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .cta-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(220,38,38,0.4);
    }

    .hero-bottom-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 6rem;
      background: linear-gradient(to top, {{ .Site.Params.colors.background }}, transparent);
      pointer-events: none;
    }

    #contact-panel {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 40;
      display: none;
      flex-direction: column;
      gap: 1rem;
      padding: 1.25rem;
      border-radius: 1rem 0 0 1rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      background: rgba(249,250,251,0.95);
      border: 1px solid rgba(0,0,0,0.08);
      border-right: none;
      width: 280px;
      max-height: 90%;
    }
    @media (min-width: 1024px) {
      #contact-panel { display: flex; }
    }

    .panel-header {
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 1rem;
    }
    .panel-label {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      color: {{ .Site.Params.colors.secondaryText }};
      margin: 0 0 0.25rem 0;
    }
    .panel-shop-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.125rem;
      color: {{ .Site.Params.colors.text }};
      margin: 0;
    }

    .panel-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .panel-item:hover { background: #f3f4f6; }
    .panel-item-start { align-items: flex-start; }

    .panel-icon {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(220,38,38,0.1);
    }
    .panel-icon-top { margin-top: 0.125rem; }

    .panel-info { flex: 1; min-width: 0; }
    .panel-info-label {
      font-size: 0.75rem;
      color: {{ .Site.Params.colors.secondaryText }};
      margin: 0 0 0.15rem 0;
    }
    .panel-info-value {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      color: {{ .Site.Params.colors.text }};
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .panel-info-value-wrap {
      white-space: normal;
      line-height: 1.3;
    }

    #parts { width: 100%; }

    .parts-inner {
      padding-top: 4rem;
      padding-bottom: 4rem;
    }

    .section-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .section-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.875rem;
      margin: 0 0 0.5rem 0;
      color: {{ .Site.Params.colors.text }};
    }
    @media (min-width: 768px) {
      .section-title { font-size: 2.25rem; }
    }
    .section-subtitle {
      font-size: 1rem;
      color: {{ .Site.Params.colors.secondaryText }};
      margin: 0;
    }

    #parts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }
    @media (min-width: 640px) {
      #parts-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      #parts-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .part-card {
      border-radius: 1rem;
      padding: 1.5rem;
      background: {{ .Site.Params.colors.background }};
      border: 1px solid rgba(0,0,0,0.06);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .part-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    .part-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .part-icon-wrap {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(220,38,38,0.1);
    }
    .part-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      background: rgba(220,38,38,0.10);
      color: {{ .Site.Params.colors.primaryAction }};
    }
    .part-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.125rem;
      margin: 0 0 0.25rem 0;
      color: {{ .Site.Params.colors.text }};
    }
    .part-desc {
      font-size: 0.875rem;
      margin: 0 0 1rem 0;
      color: {{ .Site.Params.colors.secondaryText }};
    }
    .part-card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .part-price {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: {{ .Site.Params.colors.primaryAction }};
    }
    .part-btn {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      color: #ffffff;
      background: {{ .Site.Params.colors.primaryAction }};
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .part-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(220,38,38,0.4);
    }

    #contact { width: 100%; }

    .contact-inner {
      padding-top: 4rem;
      padding-bottom: 4rem;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }
    @media (min-width: 640px) {
      .contact-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .contact-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .contact-card {
      border-radius: 1rem;
      padding: 1.5rem;
      text-align: center;
      background: {{ .Site.Params.colors.background }};
      border: 1px solid rgba(0,0,0,0.06);
      backdrop-filter: blur(12px);
      transition: transform 0.2s ease;
    }
    .contact-card:hover { transform: translateY(-2px); }

    .contact-icon {
      width: 3rem;
      height: 3rem;
      border-radius: 0.75rem;
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(220,38,38,0.08);
    }
    .contact-label {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      margin: 0 0 0.25rem 0;
      color: {{ .Site.Params.colors.secondaryText }};
    }
    .contact-value {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin: 0;
      color: {{ .Site.Params.colors.text }};
    }

    footer {
      width: 100%;
      padding: 2rem 1.5rem;
      text-align: center;
      background: #f3f4f6;
      border-top: 1px solid rgba(0,0,0,0.08);
    }
    .footer-text {
      font-size: 0.875rem;
      color: {{ .Site.Params.colors.secondaryText }};
      margin: 0;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 9999px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.875rem;
      color: #ffffff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeUp 0.3s ease-out;
    }
  </style>
</head>
<body>
  {{ block "main" . }}{{ end }}
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
