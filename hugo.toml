baseURL = "https://example.com/"
title = "Auto Części"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "English"
    weight = 1
    [languages.en.params]
      shopTagline = "Quality parts. Fair prices. Every make and model."
  [languages.pl]
    languageCode = "pl"
    languageName = "Polski"
    weight = 2
    [languages.pl.params]
      shopTagline = "Jakość części. Uczciwe ceny. Każda marka i model."

[params]
  shopName    = "GridLock Auto Parts"
  phone       = "+1 (555) 123-4567"
  email       = "info@gridlockauto.com"
  address     = "742 Motor Ave, Detroit MI"
  hours       = "Mon–Sat 8AM–6PM"
  themeMode   = "light"

  [params.colors]
    background     = "#ffffff"
    surface        = "#f9fafb"
    text           = "#1f2937"
    primaryAction  = "#dc2626"
    secondaryText  = "#6b7280"

  [params.font]
    family = "Outfit"
    size   = 16
