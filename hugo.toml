baseURL = "https://example.com/"
title = "Auto Części"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "English"
    weight = 1
    [languages.en.params]
      shopTagline = "Quality parts. Fair prices. Every make and model."
  [languages.pl]
    languageCode = "pl"
    languageName = "Polski"
    weight = 2
    [languages.pl.params]
      shopTagline = "Jakość części. Uczciwe ceny. Każda marka i model."

[params]
  shopName    = "Auto Części Cylke"
  phone       = "46 862 22 46"
  email       = "biuro@auto-czesci-cylke.com"
  website     = "http://auto-czesci-cylke.com"
  address     = "96-500 Sochaczew, Wąska 7"
  hours       = "pon.–pt. 08:00–18:00"
  hoursSat    = "sob. 08:00–14:00"
  themeMode        = "light"
  showContactPanel = false

  [params.colors]
    background     = "#ffffff"
    surface        = "#f9fafb"
    text           = "#1f2937"
    primaryAction  = "#dc2626"
    secondaryText  = "#6b7280"

  [params.font]
    family = "Outfit"
    size   = 16
